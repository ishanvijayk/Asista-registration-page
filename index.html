<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f4f4f5;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #71717a;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .field { margin-bottom: 1.25rem; }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #f4f4f5;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #52525b; }
    input:focus { border-color: #6366f1; }

    .optional {
      font-size: 0.7rem;
      color: #52525b;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; transform: none; }

    .msg {
      font-size: 0.8rem;
      margin-top: 1rem;
      text-align: center;
      min-height: 1.2rem;
    }

    .msg.error { color: #f87171; }
    .msg.success { color: #4ade80; }

    .privacy {
      font-size: 0.72rem;
      color: #52525b;
      text-align: center;
      margin-top: 1.25rem;
    }
    .logo img{
    width: 100%;
    height: 100%;
    object-fit: contain;
}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
    <img src="Logo.webp" alt="Logo">
    </div>
    

    <h1>Let's get started</h1>
    <p class="subtitle">Tell us a little about yourself.</p>

    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Jane Smith" required />
    </div>

    <div class="field">
      <label>Company</label>
      <input type="text" id="company" placeholder="Acme Inc." required />
    </div>

    <div class="field">
      <label>Email <span class="optional">optional</span></label>
      <input type="email" id="email" placeholder="jane@acme.com" />
    </div>

    <button id="submitBtn" onclick="handleSubmit()">Continue →</button>
    <p class="msg" id="msg"></p>
    <p class="privacy">Your information is kept private and never shared.</p>
  </div>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbztN5J2A_rJganbYJxLpp0PqdRXPZf6yRJQChMmLg2OXldM9hmgiRT0pmO-ZSoq2Gnqzw/exec";
    const YOUTUBE_URL = "https://youtu.be/q4udp24vs7Y?si=vSNtuQQLuYt-GaE3";

    async function handleSubmit() {
      const name = document.getElementById("name").value.trim();
      const company = document.getElementById("company").value.trim();
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("submitBtn");
      const msg = document.getElementById("msg");

      msg.className = "msg";
      msg.textContent = "";

      if (!name) { showMsg("Please enter your name.", "error"); return; }
      if (!company) { showMsg("Please enter your company.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        await fetch(SHEET_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, company, email, timestamp: new Date().toISOString() })
        });
      } catch (e) {
      }

      window.location.href = YOUTUBE_URL;
    }
  </script>
</body>
</html>
