<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Asista</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.75rem;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f4f4f5;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #71717a;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field { margin-bottom: 1.25rem; }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #f4f4f5;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #52525b; }
    input:focus { border-color: #9061f9; }

    .optional {
      font-size: 0.7rem;
      color: #52525b;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #9061f9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    button:hover { background: #7c3aed; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; transform: none; }

    .msg {
      font-size: 0.8rem;
      margin-top: 1rem;
      text-align: center;
      min-height: 1.2rem;
    }

    .msg.error { color: #f87171; }

    .privacy {
      font-size: 0.72rem;
      color: #52525b;
      text-align: center;
      margin-top: 1.25rem;
    }
  </style>
</head>

    <h1>Let's get started</h1>
    <p class="subtitle">Tell us a little about yourself.</p>

    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Jane Smith" />
    </div>

    <div class="field">
      <label>Company</label>
      <input type="text" id="company" placeholder="Acme Inc." />
    </div>

    <div class="field">
      <label>Email <span class="optional">optional</span></label>
      <input type="email" id="email" placeholder="jane@acme.com" />
    </div>

    <button id="submitBtn" onclick="handleSubmit()">Continue →</button>
    <p class="msg" id="msg"></p>
    <p class="privacy">Your information is kept private and never shared.</p>
  </div>

  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <form
    id="data_form"
    method="POST"
    action="https://script.google.com/macros/s/AKfycbztN5J2A_rJganbYJxLpp0PqdRXPZf6yRJQChMmLg2OXldM9hmgiRT0pmO-ZSoq2Gnqzw/exec"
    target="hidden_iframe"
    style="display:none;"
  >
    <input type="hidden" name="name" id="f_name" />
    <input type="hidden" name="company" id="f_company" />
    <input type="hidden" name="email" id="f_email" />
    <input type="hidden" name="timestamp" id="f_timestamp" />
  </form>

  <script>
    const YOUTUBE_URL = "https://youtu.be/q4udp24vs7Y?si=vSNtuQQLuYt-GaE3";

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.className = "msg " + type;
      msg.textContent = text;
    }

    function handleSubmit() {
      const name = document.getElementById("name").value.trim();
      const company = document.getElementById("company").value.trim();
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("submitBtn");

      document.getElementById("msg").className = "msg";
      document.getElementById("msg").textContent = "";

      if (!name) { showMsg("Please enter your name.", "error"); return; }
      if (!company) { showMsg("Please enter your company.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "Saving…";

      document.getElementById("f_name").value = name;
      document.getElementById("f_company").value = company;
      document.getElementById("f_email").value = email;
      document.getElementById("f_timestamp").value = new Date().toISOString();

      document.getElementById("data_form").submit();

      setTimeout(function () {
        window.location.href = YOUTUBE_URL;
      }, 800);
    }
  </script>
